<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chep's Money">
    <meta name="theme-color" content="#1a4d2e">
    
    <link rel="manifest" href="manifest.json">
    <title>Chep's Money v2</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #root {
            width: 100%;
            height: 100%;
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, #0d2818 0%, #1a4d2e 50%, #0d2818 100%);
            color: #f0f9f6;
        }
        
        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
        }
        
        input, select, button, textarea {
            -webkit-user-select: text;
            user-select: text;
            font-family: 'Georgia', serif;
        }
        
        input:focus, select:focus, button:focus, textarea:focus {
            outline: none;
        }

        .scripture-box {
            background: linear-gradient(135deg, rgba(88,214,168,0.15) 0%, rgba(45,122,74,0.15) 100%);
            border-left: 4px solid #58d6a8;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-style: italic;
            font-size: 13px;
            line-height: 1.6;
            color: #c8f0e8;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const { useState, useEffect } = React;
        const e = React.createElement;

        function CheepsMoneyV2() {
            const defaultBudgets = [
                { id: 1, category: 'Housing/Rent', limit: 680, spent: 0 },
                { id: 2, category: 'Food & Groceries', limit: 120, spent: 0 },
                { id: 3, category: 'Transportation', limit: 25, spent: 0 },
                { id: 4, category: 'Entertainment', limit: 350, spent: 0 },
                { id: 5, category: 'Utilities', limit: 10, spent: 0 },
                { id: 6, category: 'Personal effects', limit: 50, spent: 0 },
                { id: 7, category: 'Family spend', limit: 550, spent: 0 },
                { id: 8, category: 'Weekly spend', limit: 125, spent: 0 },
                { id: 9, category: 'Home replenishments', limit: 40, spent: 0 },
                { id: 10, category: 'Tithe', limit: 350, spent: 0 },
                { id: 11, category: 'Miscellaneous', limit: 100, spent: 0 },
                { id: 12, category: 'Long Term savings', limit: 600, spent: 0 },
                { id: 13, category: 'Emergency fund', limit: 500, spent: 0 },
            ];

            const [budgets, setBudgets] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [incomeSources, setIncomeSources] = useState([]);
            const [activeTab, setActiveTab] = useState('tracker');
            const [newExpense, setNewExpense] = useState({ description: '', amount: '', category: 'Food & Groceries', date: new Date().toISOString().split('T')[0] });
            const [newIncomeSource, setNewIncomeSource] = useState({ name: '', amount: '' });
            const [editingBudget, setEditingBudget] = useState(null);
            const [isEditingBudgets, setIsEditingBudgets] = useState(false);
            const [reviewComments, setReviewComments] = useState('');

            // Load from localStorage
            useEffect(() => {
                const savedBudgets = localStorage.getItem('cheps_budgets_v2');
                const savedExpenses = localStorage.getItem('cheps_expenses_v2');
                const savedIncome = localStorage.getItem('cheps_income_v2');
                
                if (savedBudgets) {
                    setBudgets(JSON.parse(savedBudgets));
                } else {
                    setBudgets(defaultBudgets);
                }
                
                if (savedExpenses) {
                    setExpenses(JSON.parse(savedExpenses));
                }

                if (savedIncome) {
                    setIncomeSources(JSON.parse(savedIncome));
                } else {
                    setIncomeSources([{ id: 1, name: 'Primary Income', amount: 3500 }]);
                }
            }, []);

            // Save to localStorage
            useEffect(() => {
                if (budgets.length > 0) {
                    localStorage.setItem('cheps_budgets_v2', JSON.stringify(budgets));
                }
            }, [budgets]);

            useEffect(() => {
                localStorage.setItem('cheps_expenses_v2', JSON.stringify(expenses));
            }, [expenses]);

            useEffect(() => {
                localStorage.setItem('cheps_income_v2', JSON.stringify(incomeSources));
            }, [incomeSources]);

            const totalIncome = incomeSources.reduce((sum, source) => sum + source.amount, 0);
            const totalSpent = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            const remaining = totalIncome - totalSpent;

            const addExpense = () => {
                if (newExpense.description && newExpense.amount) {
                    const expense = {
                        id: Date.now(),
                        date: newExpense.date,
                        description: newExpense.description,
                        amount: parseFloat(newExpense.amount),
                        category: newExpense.category,
                    };
                    setExpenses([expense, ...expenses]);
                    setBudgets(budgets.map(b => 
                        b.category === newExpense.category 
                            ? { ...b, spent: b.spent + parseFloat(newExpense.amount) }
                            : b
                    ));
                    setNewExpense({ description: '', amount: '', category: 'Food & Groceries', date: new Date().toISOString().split('T')[0] });
                }
            };

            const addIncomeSource = () => {
                if (newIncomeSource.name && newIncomeSource.amount) {
                    const source = {
                        id: Date.now(),
                        name: newIncomeSource.name,
                        amount: parseFloat(newIncomeSource.amount),
                    };
                    setIncomeSources([...incomeSources, source]);
                    setNewIncomeSource({ name: '', amount: '' });
                }
            };

            const deleteIncomeSource = (id) => {
                setIncomeSources(incomeSources.filter(s => s.id !== id));
            };

            const deleteExpense = (id) => {
                const expense = expenses.find(e => e.id === id);
                if (expense) {
                    setExpenses(expenses.filter(e => e.id !== id));
                    setBudgets(budgets.map(b => 
                        b.category === expense.category 
                            ? { ...b, spent: Math.max(0, b.spent - expense.amount) }
                            : b
                    ));
                }
            };

            const saveBudgetEdit = (id, newLimit) => {
                setBudgets(budgets.map(b => 
                    b.id === id ? { ...b, limit: parseFloat(newLimit) } : b
                ));
                setEditingBudget(null);
            };

            const overBudgetCategories = budgets.filter(b => b.spent > b.limit);

            return e('div', { style: { display: 'flex', flexDirection: 'column', height: '100vh', background: 'linear-gradient(135deg, #0d2818 0%, #1a4d2e 50%, #0d2818 100%)' } },
                // Header
                e('div', { style: { padding: '16px', paddingTop: '32px', borderBottom: '2px solid rgba(88,214,168,0.3)', background: 'linear-gradient(135deg, rgba(13,40,24,0.8) 0%, rgba(26,77,46,0.8) 100%)' } },
                    e('div', { style: { display: 'flex', alignItems: 'flex-end', gap: '8px', marginBottom: '12px' } },
                        e('div', { style: { fontSize: '28px' } }, '🌿'),
                        e('h1', { style: { fontSize: '28px', fontWeight: 'bold', background: 'linear-gradient(135deg, #88d6a8 0%, #58d6a8 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', margin: 0 } }, "Chep's Money v2")
                    ),
                    e('p', { style: { fontSize: '12px', color: '#88d6a8', marginBottom: '12px', fontStyle: 'italic' } }, 'Flexible budgeting, insightful reviews'),
                    
                    // Tabs
                    e('div', { style: { display: 'flex', gap: '8px', overflowX: 'auto', paddingTop: '8px' } },
                        ['tracker', 'income', 'budgets', 'reviews', 'data'].map(tab =>
                            e('button', {
                                key: tab,
                                onClick: () => setActiveTab(tab),
                                style: {
                                    padding: '8px 16px',
                                    border: 'none',
                                    background: activeTab === tab ? 'rgba(88,214,168,0.4)' : 'rgba(88,214,168,0.1)',
                                    color: activeTab === tab ? '#88d6a8' : '#58d6a8',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontSize: '13px',
                                    fontWeight: '500',
                                    whiteSpace: 'nowrap',
                                    transition: 'all 0.3s',
                                    borderBottom: activeTab === tab ? '2px solid #88d6a8' : 'none'
                                }
                            },
                            tab === 'tracker' ? '💰 Tracker' :
                            tab === 'income' ? '💵 Income' :
                            tab === 'budgets' ? '📊 Budgets' :
                            tab === 'reviews' ? '📋 Reviews' : '💾 Data'
                            )
                        )
                    )
                ),

                // Main Content
                e('div', { style: { flex: 1, overflowY: 'auto', padding: '16px', paddingBottom: '80px' } },
                    activeTab === 'tracker' && e('div', null,
                        // Stats
                        e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' } },
                            e('div', { style: { background: 'linear-gradient(135deg, rgba(88,214,168,0.3) 0%, rgba(88,214,168,0.1) 100%)', padding: '16px', borderRadius: '12px', border: '1px solid rgba(88,214,168,0.3)' } },
                                e('p', { style: { fontSize: '12px', opacity: 0.8, marginBottom: '4px', color: '#88d6a8' } }, 'Total Income'),
                                e('p', { style: { fontSize: '24px', fontWeight: 'bold', color: '#58d6a8' } }, '€' + totalIncome.toFixed(2))
                            ),
                            e('div', { style: { background: 'linear-gradient(135deg, rgba(185,28,28,0.3) 0%, rgba(185,28,28,0.1) 100%)', padding: '16px', borderRadius: '12px', border: '1px solid rgba(185,28,28,0.3)' } },
                                e('p', { style: { fontSize: '12px', opacity: 0.8, marginBottom: '4px', color: '#f87171' } }, 'Total Spent'),
                                e('p', { style: { fontSize: '24px', fontWeight: 'bold', color: '#fca5a5' } }, '€' + totalSpent.toFixed(2))
                            ),
                            e('div', { style: { background: remaining >= 0 ? 'linear-gradient(135deg, rgba(88,214,168,0.3) 0%, rgba(88,214,168,0.1) 100%)' : 'linear-gradient(135deg, rgba(185,28,28,0.3) 0%, rgba(185,28,28,0.1) 100%)', padding: '16px', borderRadius: '12px', border: remaining >= 0 ? '1px solid rgba(88,214,168,0.3)' : '1px solid rgba(185,28,28,0.3)', gridColumn: '1/3' } },
                                e('p', { style: { fontSize: '12px', opacity: 0.8, marginBottom: '4px', color: remaining >= 0 ? '#88d6a8' : '#f87171' } }, 'Remaining'),
                                e('p', { style: { fontSize: '24px', fontWeight: 'bold', color: remaining >= 0 ? '#58d6a8' : '#fca5a5' } }, '€' + remaining.toFixed(2))
                            )
                        ),

                        // Alert
                        overBudgetCategories.length > 0 && e('div', { style: { background: 'rgba(185,28,28,0.2)', border: '2px solid rgba(185,28,28,0.5)', borderRadius: '12px', padding: '12px', marginBottom: '16px' } },
                            e('p', { style: { color: '#fca5a5', fontSize: '14px', fontWeight: '500' } }, '⚠️ Over Budget Alert'),
                            e('p', { style: { color: '#fecaca', fontSize: '12px', marginTop: '4px' } }, overBudgetCategories.map(b => b.category).join(', '))
                        ),

                        // Add Expense
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px', marginBottom: '16px' } },
                            e('h3', { style: { fontSize: '16px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Add Expense'),
                            e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
                                e('input', { type: 'date', value: newExpense.date, onChange: (ev) => setNewExpense({ ...newExpense, date: ev.target.value }), style: { padding: '10px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '14px' } }),
                                e('input', { type: 'text', placeholder: 'Description', value: newExpense.description, onChange: (ev) => setNewExpense({ ...newExpense, description: ev.target.value }), style: { padding: '10px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '14px' } }),
                                e('input', { type: 'number', placeholder: 'Amount (€)', value: newExpense.amount, onChange: (ev) => setNewExpense({ ...newExpense, amount: ev.target.value }), style: { padding: '10px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '14px' } }),
                                e('select', { value: newExpense.category, onChange: (ev) => setNewExpense({ ...newExpense, category: ev.target.value }), style: { padding: '10px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '14px' } },
                                    budgets.map(b => e('option', { key: b.id, value: b.category }, b.category))
                                ),
                                e('button', { onClick: addExpense, style: { padding: '12px', background: 'linear-gradient(135deg, #58d6a8 0%, #88d6a8 100%)', border: 'none', color: '#0d2818', borderRadius: '8px', fontWeight: '700', fontSize: '14px', cursor: 'pointer' } }, '➕ Record Expense')
                            )
                        ),

                        // Budget Overview
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px' } },
                            e('h3', { style: { fontSize: '16px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Budget Categories'),
                            e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
                                budgets.map(b => {
                                    const percentage = (b.spent / b.limit) * 100;
                                    const isOver = b.spent > b.limit;
                                    return e('div', { key: b.id, style: { background: 'rgba(13,40,24,0.5)', padding: '12px', borderRadius: '8px', borderLeft: `3px solid ${isOver ? '#f87171' : '#88d6a8'}` } },
                                        e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '6px' } },
                                            e('p', { style: { fontSize: '13px', fontWeight: '500', color: '#c8f0e8' } }, b.category)
                                        ),
                                        e('div', { style: { background: 'rgba(71,85,105,0.3)', height: '6px', borderRadius: '3px', overflow: 'hidden', marginBottom: '4px' } },
                                            e('div', { style: { height: '100%', background: isOver ? '#f87171' : 'linear-gradient(90deg, #58d6a8 0%, #88d6a8 100%)', width: `${Math.min(percentage, 100)}%`, transition: 'width 0.3s' } })
                                        ),
                                        e('p', { style: { fontSize: '11px', color: isOver ? '#fca5a5' : '#88d6a8' } }, '€' + b.spent.toFixed(2) + ' / €' + b.limit.toFixed(2) + (isOver ? ' ⚠️' : ''))
                                    );
                                })
                            )
                        )
                    ),

                    activeTab === 'income' && e('div', null,
                        e('h2', { style: { fontSize: '18px', fontWeight: '600', marginBottom: '16px', color: '#88d6a8' } }, 'Income Sources'),
                        e('div', { style: { background: 'linear-gradient(135deg, rgba(88,214,168,0.2) 0%, rgba(45,122,74,0.2) 100%)', border: '2px solid rgba(88,214,168,0.3)', borderRadius: '12px', padding: '16px', marginBottom: '16px' } },
                            e('p', { style: { fontSize: '12px', color: '#88d6a8', fontWeight: '600', marginBottom: '8px' } }, 'Total Monthly Income'),
                            e('p', { style: { fontSize: '32px', fontWeight: 'bold', color: '#58d6a8' } }, '€' + totalIncome.toFixed(2))
                        ),
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px', marginBottom: '16px' } },
                            e('h3', { style: { fontSize: '16px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Your Income'),
                            e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '12px' } },
                                incomeSources.map(source => e('div', { key: source.id, style: { background: 'rgba(13,40,24,0.5)', padding: '12px', borderRadius: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                                    e('div', null,
                                        e('p', { style: { fontSize: '14px', fontWeight: '500', color: '#c8f0e8' } }, source.name),
                                        e('p', { style: { fontSize: '12px', color: '#88d6a8' } }, '€' + source.amount.toFixed(2))
                                    ),
                                    e('button', { onClick: () => deleteIncomeSource(source.id), style: { background: 'none', border: 'none', color: '#9CA3AF', cursor: 'pointer', fontSize: '16px' } }, '🗑️')
                                ))
                            )
                        ),
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px' } },
                            e('h3', { style: { fontSize: '16px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Add Income Source'),
                            e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
                                e('input', { type: 'text', placeholder: 'Income source name', value: newIncomeSource.name, onChange: (ev) => setNewIncomeSource({ ...newIncomeSource, name: ev.target.value }), style: { padding: '10px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '14px' } }),
                                e('input', { type: 'number', placeholder: 'Amount (€)', value: newIncomeSource.amount, onChange: (ev) => setNewIncomeSource({ ...newIncomeSource, amount: ev.target.value }), style: { padding: '10px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '14px' } }),
                                e('button', { onClick: addIncomeSource, style: { padding: '12px', background: 'linear-gradient(135deg, #58d6a8 0%, #88d6a8 100%)', border: 'none', color: '#0d2818', borderRadius: '8px', fontWeight: '700', fontSize: '14px', cursor: 'pointer' } }, '➕ Add Income')
                            )
                        )
                    ),

                    activeTab === 'budgets' && e('div', null,
                        e('h2', { style: { fontSize: '18px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Manage Your Budgets'),
                        !isEditingBudgets ? e('div', { style: { background: 'linear-gradient(135deg, rgba(88,214,168,0.2) 0%, rgba(45,122,74,0.2) 100%)', border: '2px solid rgba(88,214,168,0.3)', borderRadius: '12px', padding: '16px', marginBottom: '16px' } },
                            e('p', { style: { fontSize: '12px', color: '#88d6a8', marginBottom: '12px' } }, '💡 Edit your budget allocations for the month.'),
                            e('button', { onClick: () => setIsEditingBudgets(true), style: { padding: '12px', background: 'linear-gradient(135deg, #58d6a8 0%, #88d6a8 100%)', border: 'none', color: '#0d2818', borderRadius: '8px', fontWeight: '700', fontSize: '14px', cursor: 'pointer', width: '100%' } }, '✏️ Edit Budgets')
                        ) : e('div', { style: { background: 'rgba(185,28,28,0.2)', border: '2px solid rgba(185,28,28,0.5)', borderRadius: '12px', padding: '16px', marginBottom: '16px' } },
                            e('p', { style: { color: '#fca5a5', fontSize: '12px' } }, '⚠️ Editing mode active!')
                        ),
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px' } },
                            e('h3', { style: { fontSize: '16px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Budget Categories'),
                            e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
                                budgets.map(b => e('div', { key: b.id, style: { background: 'rgba(13,40,24,0.5)', padding: '12px', borderRadius: '8px' } },
                                    e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '8px' } },
                                        e('p', { style: { fontSize: '13px', fontWeight: '500', color: '#c8f0e8' } }, b.category)
                                    ),
                                    editingBudget === b.id ? e('div', { style: { display: 'flex', gap: '8px' } },
                                        e('input', { type: 'number', defaultValue: b.limit, id: `edit-${b.id}`, style: { flex: 1, padding: '8px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '6px', color: '#c8f0e8', fontSize: '13px' } }),
                                        e('button', { onClick: () => saveBudgetEdit(b.id, document.getElementById(`edit-${b.id}`).value), style: { padding: '8px 12px', background: '#58d6a8', border: 'none', color: '#0d2818', borderRadius: '6px', fontWeight: '600', cursor: 'pointer', fontSize: '12px' } }, '✓'),
                                        e('button', { onClick: () => setEditingBudget(null), style: { padding: '8px 12px', background: '#f87171', border: 'none', color: 'white', borderRadius: '6px', fontWeight: '600', cursor: 'pointer', fontSize: '12px' } }, '✕')
                                    ) : e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                                        e('p', { style: { fontSize: '12px', color: '#88d6a8', fontWeight: '600' } }, '€' + b.limit.toFixed(2)),
                                        isEditingBudgets && e('button', { onClick: () => setEditingBudget(b.id), style: { background: 'none', border: 'none', color: '#88d6a8', cursor: 'pointer', fontSize: '14px' } }, '✏️')
                                    )
                                ))
                            ),
                            isEditingBudgets && e('div', { style: { marginTop: '16px' } },
                                e('button', { onClick: () => setIsEditingBudgets(false), style: { width: '100%', padding: '12px', background: 'linear-gradient(135deg, #58d6a8 0%, #88d6a8 100%)', border: 'none', color: '#0d2818', borderRadius: '8px', fontWeight: '700', cursor: 'pointer', fontSize: '14px' } }, '✓ Done Editing')
                            )
                        )
                    ),

                    activeTab === 'reviews' && e('div', null,
                        e('h2', { style: { fontSize: '18px', fontWeight: '600', marginBottom: '16px', color: '#88d6a8' } }, 'Monthly Review'),
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px', marginBottom: '16px' } },
                            e('h3', { style: { fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, 'Monthly Reflections'),
                            e('textarea', { value: reviewComments, onChange: (ev) => setReviewComments(ev.target.value), placeholder: 'Write your thoughts about this month...', style: { width: '100%', padding: '12px', background: 'rgba(13,40,24,0.8)', border: '1px solid rgba(88,214,168,0.3)', borderRadius: '8px', color: '#c8f0e8', fontSize: '13px', fontFamily: 'Georgia, serif', minHeight: '100px' } }),
                            e('button', { onClick: () => alert('Review saved! 💚'), style: { width: '100%', marginTop: '12px', padding: '12px', background: 'linear-gradient(135deg, #58d6a8 0%, #88d6a8 100%)', border: 'none', color: '#0d2818', borderRadius: '8px', fontWeight: '700', fontSize: '14px', cursor: 'pointer' } }, '💾 Save Review')
                            )
                        ),
                        e('div', { style: { background: 'linear-gradient(135deg, rgba(88,214,168,0.2) 0%, rgba(45,122,74,0.2) 100%)', border: '2px solid rgba(88,214,168,0.3)', borderRadius: '12px', padding: '16px' } },
                            e('p', { style: { fontSize: '12px', color: '#c8f0e8', lineHeight: '1.6' } }, 'Income: €' + totalIncome.toFixed(2) + ' | Spent: €' + totalSpent.toFixed(2) + ' | Remaining: €' + remaining.toFixed(2))
                        )
                    ),

                    activeTab === 'data' && e('div', null,
                        e('h2', { style: { fontSize: '18px', fontWeight: '600', marginBottom: '16px', color: '#88d6a8' } }, 'Data & Backup'),
                        e('div', { style: { background: 'rgba(26,77,46,0.6)', border: '2px solid rgba(88,214,168,0.2)', borderRadius: '12px', padding: '16px' } },
                            e('h3', { style: { fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#88d6a8' } }, '📥 Export Data'),
                            e('button', { onClick: () => {
                                const data = { budgets, expenses, incomeSources, timestamp: new Date().toISOString() };
                                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                                const url = URL.createObjectURL(blob);
                                const link = document.createElement('a');
                                link.href = url;
                                link.download = `cheps_money_v2_${new Date().toISOString().split('T')[0]}.json`;
                                link.click();
                            }, style: { width: '100%', padding: '12px', background: 'linear-gradient(135deg, #58d6a8 0%, #88d6a8 100%)', border: 'none', color: '#0d2818', borderRadius: '8px', fontWeight: '600', cursor: 'pointer' } }, '💾 Export JSON')
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(CheepsMoneyV2));
    </script>
</body>
</html>
